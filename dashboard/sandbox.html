<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>agentworld · sandbox</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>

<link rel="stylesheet" href="_tokens.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f0eee6;
    color: var(--text);
    font-family: var(--mono);
  }

  canvas#scene {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #status {
    position: fixed;
    bottom: 14px;
    right: 18px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 4px 8px;
    background: rgba(6, 8, 16, 0.7);
    border: 1px solid var(--border);
    border-radius: 2px;
    pointer-events: none;
  }
  #status[data-kind="live"]      { color: var(--accent); border-color: rgba(184,154,85,0.5); }
  #status[data-kind="done"]      { color: var(--green); }
  #status[data-kind="error"]     { color: var(--red); }
  #status[data-kind="cancelled"] { color: var(--text-3); }

  /* Init loader. Thin bar across the top whose fill matches the
     caterpillar segment colour, on a faint grid-edge background.
     Fades out once the first cast snapshot arrives. */
  #loader {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    pointer-events: none;
    transition: opacity 700ms ease-out;
  }
  #loader[data-done="1"] { opacity: 0; }
  #loader-track {
    height: 3px;
    background: rgba(158, 152, 140, 0.30);
  }
  #loader-fill {
    height: 100%;
    width: 0%;
    background: rgb(26, 20, 18);
    transition: width 450ms ease-out;
  }
  #loader-label {
    margin: 8px auto 0;
    width: max-content;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.55);
  }

  /* Layer-toggle panel. Lives in the bottom-left, matches the
     status-badge aesthetic. */
  #toggles {
    position: fixed;
    bottom: 14px;
    left: 18px;
    z-index: 50;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.85);
    background: rgba(245, 240, 230, 0.92);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 11px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  #toggles label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  #toggles input[type="checkbox"] {
    margin: 0;
    cursor: pointer;
    accent-color: rgba(102, 140, 200, 0.8);
  }
  #toggles .ratio-control {
    display: flex;
    flex-direction: column;
    gap: 3px;
    cursor: default;
  }
  #toggles .ratio-control .ratio-readout {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  #toggles input[type="range"] {
    margin: 0;
    width: 140px;
    accent-color: rgba(217, 166, 77, 0.9);
    cursor: pointer;
  }
  .toggle-divider {
    height: 1px;
    background: rgba(102, 140, 200, 0.18);
    margin: 1px 0;
  }
  .metric-toggle .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    border: 1px solid rgba(26, 20, 18, 0.20);
  }
  #trade-counter {
    padding-top: 5px;
    margin-top: 2px;
    border-top: 1px solid rgba(102, 140, 200, 0.25);
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  #trade-counter-value {
    color: rgba(26, 20, 18, 0.95);
    font-variant-numeric: tabular-nums;
  }

  /* HUD readout — top-right. Numeric mirror of the engine signals
     that drive the visual: α (lever input), EBI (engine output),
     welfare delta, gini, ticks/sec. */
  #hud-panel {
    position: fixed;
    top: 14px;
    right: 18px;
    z-index: 50;
    background: rgba(245, 240, 230, 0.94);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 11px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.85);
    min-width: 130px;
  }
  .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
    line-height: 1.5;
  }
  .hud-row-label { color: rgba(26, 20, 18, 0.55); }
  .hud-row-value {
    font-variant-numeric: tabular-nums;
    color: rgba(26, 20, 18, 0.95);
  }

  /* Live levers — right side, under the HUD. Each row is a slider
     for a parameter the engine accepts via POST /runs/{id}/update.
     Starts with α (the master smooth/baroque axis). */
  #levers-panel {
    position: fixed;
    top: 175px;
    right: 18px;
    z-index: 50;
    background: rgba(245, 240, 230, 0.94);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 11px 10px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.85);
    width: 180px;
  }
  #levers-title {
    font-size: 9px;
    letter-spacing: 0.16em;
    color: rgba(26, 20, 18, 0.55);
    margin-bottom: 5px;
  }
  .lever-row {
    margin-top: 6px;
  }
  .lever-row:first-of-type { margin-top: 0; }
  .lever-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .lever-label { color: rgba(26, 20, 18, 0.75); }
  .lever-value {
    font-variant-numeric: tabular-nums;
    color: rgba(26, 20, 18, 0.95);
  }
  #levers-panel input[type="range"] {
    margin: 2px 0 0;
    width: 100%;
    accent-color: rgba(102, 140, 200, 0.85);
    cursor: pointer;
  }

  /* Wealth flow meter. Bottom-right corner. Stacked rows showing
     the share of wealth captured by each Sankey segment, with the
     cumulative total at the top. */
  #welfare-panel {
    position: fixed;
    bottom: 14px;
    right: 18px;
    z-index: 50;
    background: rgba(245, 240, 230, 0.94);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 9px 12px 11px;
    font-family: var(--mono);
    color: rgba(26, 20, 18, 0.85);
    width: 240px;
  }
  #welfare-title {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.65);
    margin-bottom: 4px;
  }
  #welfare-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 7px;
    margin-bottom: 7px;
    border-bottom: 1px solid rgba(102, 140, 200, 0.18);
  }
  #welfare-total-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.55);
  }
  #welfare-total-value {
    font-size: 14px;
    color: rgba(26, 20, 18, 0.95);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .meter-section-header {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.45);
    margin-top: 9px;
    margin-bottom: 4px;
  }
  .meter-section-header:first-of-type {
    margin-top: 0;
  }
  .meter-row {
    margin-top: 5px;
  }
  .meter-row:first-of-type {
    margin-top: 0;
  }
  .meter-row-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(26, 20, 18, 0.75);
  }
  .meter-row-label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .meter-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 1px;
  }
  .meter-row-value {
    font-variant-numeric: tabular-nums;
    color: rgba(26, 20, 18, 0.85);
  }
  .meter-bar {
    height: 5px;
    background: rgba(26, 20, 18, 0.07);
    margin-top: 2px;
    border-radius: 1px;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    width: 0%;
  }

  /* Sector hover label. Follows the cursor when the pointer is
     over a sector region. */
  #sector-label {
    position: fixed;
    display: none;
    pointer-events: none;
    z-index: 50;
    background: rgba(245, 240, 230, 0.95);
    color: rgba(26, 20, 18, 0.85);
    padding: 5px 9px;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-family: var(--mono);
    border: 1px solid rgba(102, 140, 200, 0.55);
    border-radius: 2px;
  }

</style>
</head>
<body>

<canvas id="scene"></canvas>
<div id="loader" data-done="0">
  <div id="loader-track"><div id="loader-fill"></div></div>
  <div id="loader-label">init</div>
</div>
<div id="hud-panel">
  <div class="hud-row"><span class="hud-row-label">α</span><span class="hud-row-value" id="hud-alpha">--</span></div>
  <div class="hud-row"><span class="hud-row-label">ebi</span><span class="hud-row-value" id="hud-ebi">--</span></div>
  <div class="hud-row"><span class="hud-row-label">welfare Δ</span><span class="hud-row-value" id="hud-welfare-step">--</span></div>
  <div class="hud-row"><span class="hud-row-label">gini</span><span class="hud-row-value" id="hud-gini">--</span></div>
  <div class="hud-row"><span class="hud-row-label">ticks/s</span><span class="hud-row-value" id="hud-tps">--</span></div>
</div>
<div id="levers-panel">
  <div id="levers-title">live levers</div>
  <div class="lever-row">
    <div class="lever-header"><span class="lever-label">market layer tax</span><span class="lever-value" id="lever-market-tax-value">2.5%</span></div>
    <input type="range" id="lever-market-tax" min="0" max="0.25" step="0.005" value="0.025">
  </div>
  <div class="lever-row">
    <div class="lever-header"><span class="lever-label">pigouvian tax</span><span class="lever-value" id="lever-pig-tax-value">10.0%</span></div>
    <input type="range" id="lever-pig-tax" min="0" max="0.5" step="0.005" value="0.10">
  </div>
  <div class="lever-row">
    <div class="lever-header"><span class="lever-label">recycling progressivity</span><span class="lever-value" id="lever-pig-prog-value">1.0</span></div>
    <input type="range" id="lever-pig-prog" min="0" max="4" step="0.1" value="1.0">
  </div>
</div>
<div id="welfare-panel">
  <div id="welfare-title">wealth</div>
  <div id="welfare-total-row">
    <span id="welfare-total-label">cumulative</span>
    <span id="welfare-total-value">0</span>
  </div>
  <div class="meter-section-header">stock</div>
  <div id="welfare-stock"></div>
  <div class="meter-section-header">per-tick flow</div>
  <div id="welfare-flow"></div>
</div>
<div id="sector-label"></div>
<div id="toggles">
  <label><input type="checkbox" id="toggle-pause"> pause</label>
  <label><input type="checkbox" id="toggle-trades" checked> show trades</label>
  <label><input type="checkbox" id="toggle-sectors" checked> show sectors</label>
  <label><input type="checkbox" id="toggle-humans-only"> show humans only</label>
  <div class="ratio-control">
    <div class="ratio-readout"><span>humans : agents</span><span>1 : <span id="ratio-value">100</span></span></div>
    <input type="range" id="ratio-slider" min="0" max="100" value="67" step="1">
  </div>
  <div id="trade-counter"><span>trades</span><span id="trade-counter-value">0</span></div>
</div>
<div id="status" data-kind="">starting…</div>

<script type="module" src="sandbox/scene.js"></script>
</body>
</html>
